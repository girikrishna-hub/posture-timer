openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Sitting/standing/resting session tracking
  - name: settings
    description: User preferences and goals
  - name: stats
    description: Aggregated statistics and summaries
  - name: fitbit
    description: Fitbit OAuth connection and assisted-mode data
  - name: push
    description: Web Push notification subscription and server-side scheduling
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    post:
      operationId: startSession
      tags: [sessions]
      summary: Start a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionBody"
      responses:
        "201":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Filter sessions from this date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Filter sessions to this date (YYYY-MM-DD)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"

  /sessions/export:
    get:
      operationId: exportSessions
      tags: [sessions]
      summary: Export all completed sessions as CSV
      responses:
        "200":
          description: CSV file download of all completed sessions
          content:
            text/csv:
              schema:
                type: string

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get the currently active (in-progress) session
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{id}:
    patch:
      operationId: endSession
      tags: [sessions]
      summary: End an active session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndSessionBody"
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /stats/today:
    get:
      operationId: getTodayStats
      tags: [stats]
      summary: Get today's summary stats
      responses:
        "200":
          description: Today's stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayStats"

  /stats/weekly:
    get:
      operationId: getWeeklyStats
      tags: [stats]
      summary: Get this week's daily breakdown
      responses:
        "200":
          description: Weekly stats by day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyStats"

  /metrics/daily:
    get:
      operationId: getDailyMetrics
      tags: [stats]
      summary: Get per-day metrics for a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD, inclusive)
      responses:
        "200":
          description: Daily metrics for each day in range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyMetricsResponse"

  /metrics/summary:
    get:
      operationId: getMetricsSummary
      tags: [stats]
      summary: Get analytics summary (streaks, health score, sleep stats)
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryMetrics"

  /fitbit/status:
    get:
      operationId: getFitbitStatus
      tags: [fitbit]
      summary: Get Fitbit connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitbitStatus"

  /fitbit/auth-url:
    get:
      operationId: getFitbitAuthUrl
      tags: [fitbit]
      summary: Get Fitbit OAuth authorization URL
      responses:
        "200":
          description: Authorization URL to open in a new window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitbitAuthUrl"

  /fitbit/callback:
    get:
      operationId: handleFitbitCallback
      tags: [fitbit]
      summary: Fitbit OAuth callback — exchanges code for tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect back to app after token exchange

  /fitbit/disconnect:
    delete:
      operationId: disconnectFitbit
      tags: [fitbit]
      summary: Remove stored Fitbit tokens
      responses:
        "204":
          description: Disconnected

  /fitbit/intraday:
    get:
      operationId: getFitbitIntraday
      tags: [fitbit]
      summary: Get last 15 minutes of intraday step data (cached)
      responses:
        "200":
          description: Intraday step data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitbitIntradayData"
        "404":
          description: No Fitbit connection

  /fitbit/analytics:
    get:
      operationId: getFitbitAnalytics
      tags: [fitbit]
      summary: Get Fitbit assisted-mode analytics totals
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitbitAnalyticsSummary"

  /fitbit/analytics/event:
    post:
      operationId: recordFitbitEvent
      tags: [fitbit]
      summary: Record a Fitbit assisted-mode event (nudge, correction, acceptance, cancellation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FitbitEventBody"
      responses:
        "201":
          description: Event recorded

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get the VAPID public key for push subscription
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidPublicKey"

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeBody"
      responses:
        "201":
          description: Subscription saved
    delete:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeBody"
      responses:
        "204":
          description: Subscription removed

  /push/schedule:
    post:
      operationId: schedulePush
      tags: [push]
      summary: Start server-side push notification schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushScheduleBody"
      responses:
        "200":
          description: Schedule started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushScheduleResult"
    delete:
      operationId: cancelPushSchedule
      tags: [push]
      summary: Cancel the active push schedule
      responses:
        "200":
          description: Schedule cancelled

  /push/bladder-schedule:
    post:
      operationId: scheduleBladderPush
      tags: [push]
      summary: Schedule a bladder-reminder server-side push notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BladderPushScheduleBody"
      responses:
        "200":
          description: Bladder push scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushScheduleResult"
    delete:
      operationId: cancelBladderPush
      tags: [push]
      summary: Cancel the active bladder push schedule
      responses:
        "200":
          description: Bladder push cancelled

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SessionMode:
      type: string
      enum: [sitting, standing, resting, walking]

    RestType:
      type: string
      enum: [nap, sleep]
      nullable: true

    Session:
      type: object
      properties:
        id:
          type: integer
        mode:
          $ref: "#/components/schemas/SessionMode"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        restType:
          $ref: "#/components/schemas/RestType"
      required:
        - id
        - mode
        - startedAt
        - endedAt
        - durationSeconds
        - restType

    SessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        total:
          type: integer
      required:
        - sessions
        - total

    ActiveSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/Session"
          nullable: true
      required:
        - session

    StartSessionBody:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/SessionMode"
        startedAt:
          type: string
          format: date-time
          description: Optional override for session start time (used for offline sync)
        restType:
          $ref: "#/components/schemas/RestType"
          description: Optional explicit rest type; only meaningful when mode is resting
      required:
        - mode

    EndSessionBody:
      type: object
      properties:
        endedAt:
          type: string
          format: date-time
          description: Optional override for session end time (used for offline sync)

    Settings:
      type: object
      properties:
        id:
          type: integer
        dailyStandingGoalMinutes:
          type: integer
          default: 120
        sittingAlertMinutes:
          type: integer
          default: 45
        standingMinMinutes:
          type: integer
          default: 10
        standingMaxMinutes:
          type: integer
          default: 15
        reminderIntervalMinutes:
          type: integer
          default: 1
        remindersCount:
          type: integer
          default: 3
        autoDetectWalking:
          type: boolean
          default: false
      required:
        - id
        - dailyStandingGoalMinutes
        - sittingAlertMinutes
        - standingMinMinutes
        - standingMaxMinutes
        - reminderIntervalMinutes
        - remindersCount
        - autoDetectWalking

    UpdateSettingsBody:
      type: object
      properties:
        dailyStandingGoalMinutes:
          type: integer
        sittingAlertMinutes:
          type: integer
        standingMinMinutes:
          type: integer
        standingMaxMinutes:
          type: integer
        reminderIntervalMinutes:
          type: integer
        remindersCount:
          type: integer
        autoDetectWalking:
          type: boolean

    TodayStats:
      type: object
      properties:
        date:
          type: string
          format: date
        sittingMinutes:
          type: integer
        standingMinutes:
          type: integer
        walkingMinutes:
          type: integer
        restingMinutes:
          type: integer
        activeMinutes:
          type: integer
        goalMinutes:
          type: integer
        goalProgressPercent:
          type: number
        sessionCount:
          type: integer
        currentStreak:
          type: integer
      required:
        - date
        - sittingMinutes
        - standingMinutes
        - walkingMinutes
        - restingMinutes
        - activeMinutes
        - goalMinutes
        - goalProgressPercent
        - sessionCount
        - currentStreak

    DayStats:
      type: object
      properties:
        date:
          type: string
          format: date
        sittingMinutes:
          type: integer
        standingMinutes:
          type: integer
        walkingMinutes:
          type: integer
        restingMinutes:
          type: integer
        activeMinutes:
          type: integer
        goalProgressPercent:
          type: number
      required:
        - date
        - sittingMinutes
        - standingMinutes
        - walkingMinutes
        - restingMinutes
        - activeMinutes
        - goalProgressPercent

    WeeklyStats:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DayStats"
        weeklyStandingMinutes:
          type: integer
        weeklyGoalMinutes:
          type: integer
        currentStreak:
          type: integer
      required:
        - days
        - weeklyStandingMinutes
        - weeklyGoalMinutes
        - currentStreak

    DailyMetric:
      type: object
      properties:
        date:
          type: string
          format: date
        sittingMinutes:
          type: integer
        standingMinutes:
          type: integer
        walkingMinutes:
          type: integer
        napMinutes:
          type: integer
        sleepMinutes:
          type: integer
        activeMinutes:
          type: integer
        goalProgressPercent:
          type: number
        healthScore:
          type: integer
      required:
        - date
        - sittingMinutes
        - standingMinutes
        - walkingMinutes
        - napMinutes
        - sleepMinutes
        - activeMinutes
        - goalProgressPercent
        - healthScore

    DailyMetricsResponse:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        goalMinutes:
          type: integer
      required:
        - days
        - goalMinutes

    SleepConsistency:
      type: object
      properties:
        avgSleepStartFormatted:
          type: string
        stddevMinutes:
          type: integer
        sampleCount:
          type: integer
      required:
        - avgSleepStartFormatted
        - stddevMinutes
        - sampleCount

    SummaryMetrics:
      type: object
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        weeklyAverageStandingMinutes:
          type: integer
        weeklyWalkingMinutes:
          type: integer
        weeklyAverageWalkingMinutes:
          type: integer
        bestDayDate:
          type: string
          nullable: true
        bestDayMinutes:
          type: integer
        worstDayDate:
          type: string
          nullable: true
        worstDayMinutes:
          type: integer
        healthScore:
          type: integer
        healthLabel:
          type: string
        sleepConsistency:
          oneOf:
            - $ref: "#/components/schemas/SleepConsistency"
            - type: "null"
        avgNapDurationMinutes:
          type: integer
        avgSleepDurationMinutes:
          type: integer
      required:
        - currentStreak
        - longestStreak
        - weeklyAverageStandingMinutes
        - weeklyWalkingMinutes
        - weeklyAverageWalkingMinutes
        - bestDayDate
        - bestDayMinutes
        - worstDayDate
        - worstDayMinutes
        - healthScore
        - healthLabel
        - sleepConsistency
        - avgNapDurationMinutes
        - avgSleepDurationMinutes

    FitbitStatus:
      type: object
      properties:
        connected:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        connectedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - connected

    FitbitAuthUrl:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    FitbitStepMinute:
      type: object
      properties:
        time:
          type: string
          description: "HH:MM:SS"
        steps:
          type: integer
      required:
        - time
        - steps

    FitbitIntradayData:
      type: object
      properties:
        minutes:
          type: array
          items:
            $ref: "#/components/schemas/FitbitStepMinute"
        fetchedAt:
          type: string
          format: date-time
        signal:
          type: string
          enum: [sitting, standing, walking, unknown]
          description: Derived signal from last 3 minutes of step data
      required:
        - minutes
        - fetchedAt
        - signal

    FitbitAnalyticsSummary:
      type: object
      properties:
        nudgeCount:
          type: integer
        autoCorrectionCount:
          type: integer
        userAcceptedCount:
          type: integer
        userCancelledCount:
          type: integer
      required:
        - nudgeCount
        - autoCorrectionCount
        - userAcceptedCount
        - userCancelledCount

    FitbitEventBody:
      type: object
      properties:
        eventType:
          type: string
          enum: [nudge, auto_correction, user_accepted, user_cancelled]
        fromMode:
          type: string
          enum: [sitting, standing, resting, walking]
        toMode:
          type: string
          enum: [sitting, standing, resting, walking]
        reason:
          type: string
      required:
        - eventType
        - fromMode
        - toMode

    VapidPublicKey:
      type: object
      properties:
        publicKey:
          type: string
      required:
        - publicKey

    PushSubscribeBody:
      type: object
      properties:
        endpoint:
          type: string
        keys:
          type: object
          properties:
            p256dh:
              type: string
            auth:
              type: string
          required:
            - p256dh
            - auth
      required:
        - endpoint
        - keys

    PushUnsubscribeBody:
      type: object
      properties:
        endpoint:
          type: string
      required:
        - endpoint

    PushScheduleBody:
      type: object
      properties:
        mode:
          type: string
          enum: [sitting, standing, resting, walking, idle]
        elapsedSeconds:
          type: integer
          default: 0
        sittingAlertMinutes:
          type: integer
          default: 45
        standingMinMinutes:
          type: integer
          default: 10
        standingMaxMinutes:
          type: integer
          default: 15
        reminderIntervalMinutes:
          type: integer
          default: 1
        remindersCount:
          type: integer
          default: 3
      required:
        - mode

    PushScheduleResult:
      type: object
      properties:
        ok:
          type: boolean
        scheduled:
          type: boolean
      required:
        - ok
        - scheduled

    BladderPushScheduleBody:
      type: object
      properties:
        delayMs:
          type: integer
          description: Milliseconds from now until the bladder reminder should fire
        logId:
          type: string
          description: ID of the pending bladder log entry
      required:
        - delayMs
        - logId
